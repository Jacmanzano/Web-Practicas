    <body>
        <header>
            <h1>Como pelar un kiwi!</h1>
        </header>

        <p class="comienzo">Empezaremos quitandole la cascara con un cuchillo</p>
        <p>Una vez hecho esto ya tendrias el kiwi pelado!</p><br>

        <h2>Lista de materiales necesarios</h2>
        <ul id="lista">
            <li class="activa">1 kiwi</li>
            <li>1 cuchillo</li>
            <li>1 papelera</li>
            <li>1 papel</li>
        </ul><br>

        <div>
            <p>Pelar kiwis puede ser muy peligroso</p>
            <p style="color: red">MUCHO CUIDADO</p>
        </div>
